<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextTop - Mr Wasim Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --accent: #00d2ff; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: #1c2237; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        
        /* TEACHER PRIVATE SECTION */
        #admin-zone { display: none; background: #1e253c; padding: 25px; border-radius: 15px; border: 1px solid var(--accent); margin-bottom: 30px; }
        .admin-flex { display: flex; gap: 20px; flex-wrap: wrap; }
        .control-box { flex: 1; min-width: 300px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; }
        
        /* CAMERA SCREEN */
        #video-container { width: 100%; background: #000; border-radius: 8px; margin-top: 10px; display: none; position: relative; }
        video#preview { width: 100%; border-radius: 8px; border: 2px solid #ff4b2b; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: red; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }

        /* STUDENT VIEW */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d3548; }
        .card-img { height: 160px; background: #242b3d; display: flex; align-items: center; justify-content: center; }
        .card-body { padding: 15px; }

        button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-go { background: var(--accent); color: #000; }
        .btn-red { background: #ff4b2b; color: #fff; }
        .btn-sec { background: transparent; border: 1px solid #444; color: #aaa; }
        
        .alert-live { display: none; background: #ff4b2b; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 22px; font-weight: 900; letter-spacing: 1px;">NEXTTOP <span style="color:var(--accent)">WASIM</span></div>
    <button class="btn-sec" id="loginBtn" onclick="doLogin()">Teacher Login</button>
</header>

<div class="container">
    <div id="admin-zone">
        <h2 style="margin-top:0">Welcome Back, Mr Wasim</h2>
        <div class="admin-flex">
            <div class="control-box">
                <h3>1. Live Broadcast</h3>
                <button class="btn-red" id="camBtn" onclick="toggleCamera()">TURN ON CAMERA</button>
                <div id="video-container">
                    <span class="live-tag">LIVE PREVIEW</span>
                    <video id="preview" autoplay playsinline muted></video>
                </div>
            </div>
            <div class="control-box">
                <h3>2. Upload Lesson</h3>
                <input type="file" id="vidInput" accept="video/*" style="margin-bottom:10px; display:block;">
                <button class="btn-go" onclick="uploadLesson()">PUBLISH VIDEO</button>
            </div>
        </div>
    </div>

    <div id="liveBanner" class="alert-live">
        ⚠️ MR WASIM IS TEACHING LIVE RIGHT NOW! 
        <button style="margin-left:15px; background:white; color:red;" onclick="alert('Joining...')">JOIN CLASS</button>
    </div>

    <h2>Course Library</h2>
    <div class="grid" id="courseGrid">
        </div>
</div>

<script>
    // --- AUTHENTICATION ---
    function doLogin() {
        Swal.fire({
            title: 'Identity Verification',
            input: 'password',
            inputPlaceholder: 'Enter Teacher Password',
            confirmButtonText: 'Enter Dashboard',
            confirmButtonColor: '#00d2ff'
        }).then((res) => {
            if(res.value === 'Mr Wasim') {
                document.getElementById('admin-zone').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                Swal.fire('Hello Sir', 'Your camera and upload tools are ready.', 'success');
            } else if(res.value) {
                Swal.fire('Access Denied', 'Invalid Password', 'error');
            }
        });
    }

    // --- LIVE CAMERA LOGIC ---
    let isLive = false;
    async function toggleCamera() {
        const video = document.getElementById('preview');
        const box = document.getElementById('video-container');
        const btn = document.getElementById('camBtn');
        const banner = document.getElementById('liveBanner');

        if(!isLive) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                box.style.display = 'block';
                banner.style.display = 'block';
                btn.innerText = "STOP BROADCAST";
                isLive = true;
            } catch (err) {
                Swal.fire('Error', 'Could not access camera. Please check browser permissions.', 'error');
            }
        } else {
            let tracks = video.srcObject.getTracks();
            tracks.forEach(t => t.stop());
            box.style.display = 'none';
            banner.style.display = 'none';
            btn.innerText = "TURN ON CAMERA";
            isLive = false;
        }
    }

    // --- UPLOAD & STORAGE LOGIC ---
    function uploadLesson() {
        const input = document.getElementById('vidInput');
        if(!input.files[0]) return Swal.fire('Error','Select a video file','warning');

        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const lesson = {
                id: Date.now(),
                title: file.name,
                data: e.target.result // Base64 Data
            };
            
            let lessons = JSON.parse(localStorage.getItem('my_lessons') || '[]');
            lessons.push(lesson);
            localStorage.setItem('my_lessons', JSON.stringify(lessons));
            
            renderLessons();
            Swal.fire('Success','Video published to library','success');
        };
        reader.readAsDataURL(file);
    }

    function renderLessons() {
        const grid = document.getElementById('courseGrid');
        const lessons = JSON.parse(localStorage.getItem('my_lessons') || '[]');
        grid.innerHTML = '';

        lessons.forEach(l => {
            grid.innerHTML += `
                <div class="card">
                    <div class="card-img">
                        <video src="${l.data}" controls style="width:100%; height:100%"></video>
                    </div>
                    <div class="card-body">
                        <h4>${l.title}</h4>
                        <button class="btn-go" style="width:100%">Open Lesson</button>
                    </div>
                </div>
            `;
        });
    }

    // Initial Load
    window.onload = renderLessons;
</script>

</body>
</html>
